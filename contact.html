        /* Animation for spinning the logo */
        @keyframes spin {

        img.logo:hover {

        /* Spin continuously by default */
        img.logo {
        animation: spin 20s linear infinite;
        transform-origin: center;
        }

        /* Stop spinning on hover (for desktop) */
        @media (min-width: 769px) {
        img.logo:hover {
        animation-play-state: paused;
        }

        .profile-container {

        }

        p {
            text-align: left;

        }

        /* Media query for mobile responsiveness */
        @media (max-width: 768px) {
            body {
                margin: 20px;
            }

            nav {
                position: relative;
                top: 0;
                left: 0;
                text-align: center;
                margin-bottom: 20px;
            }

            nav ul {
                display: flex;
                justify-content: center;
            }

            nav ul li {
                margin: 0 10px;
            }

            main {
                margin-left: 0;
            }

            img.logo {
                position: relative;
                display: block;
                margin: 0 auto;
                margin-bottom: 25px;
            }

            .profile-container {
                max-width: 100%;
                margin: 0 auto;
            }

            img.profile {
                position: relative;
                float: none;
                margin-right: 0;
                display: block;
                margin: 0 auto;
                width: 300px;
            }

            p {
                text-align: center;
            }
           
        }
