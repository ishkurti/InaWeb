<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ina shkurti | cartomemorias</title>
    <link rel="icon" type="image/png" href="./images/home-img.png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Barlow', sans-serif;
            margin: 10px;
            background-color: white;
            color: #000;
            font-size: 15px;
        }

        /* Center name + logo + nav */
        .center-container {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Name above logo */
        .site-name {
            font-family: 'Source Code Pro', monospace;
            font-weight: bold;
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            color: #000;
            text-align: center;
        }

        nav {
            margin-top: 25px;
        }

        /* Horizontal nav */
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            text-decoration: none;
            font-family: 'Barlow', sans-serif;
            color: #0c6bd2;
            font-size: 18px;
            transition: background-color 0.3s, color 0.3s;
            padding: 0;
        }

        nav ul li a:hover {
            background-color: rgb(255, 250, 107);
            color: black;
            text-decoration: underline;
        }

        /* Logo */
        img.logo {
            width: 135px;
            height: auto;
            rotate: 10deg;
            margin-bottom: 10px;
        }

        /* Spin animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        img.logo {
            animation: spin 20s linear infinite;
            transform-origin: center;
        }

        /* Pause spin on hover (desktop only) */
        @media (min-width: 769px) {
            img.logo:hover {
                animation-play-state: paused;
            }
        }

        main {
            padding: 20px;
        }

        /* Mobile tweaks */
        @media (max-width: 768px) {
            body {
                margin: 100px;
            }

            .center-container {
                min-height: auto;
            }

            .site-name {
                font-size: 22px;
            }

            nav ul {
                gap: 20px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <div class="center-container">

        <div class="site-name">ina shkurti</div>

        <a href="index.html">
            <img src="./images/compass6.png" alt="tiempo-espacio" class="geographer">
        </a>

        

        <nav>
            <ul>
                <li><a href="about.html">about</a></li>
                <li><a href="research.html">work</a></li>
                <li><a href="sound-atlas.html">sound atlas</a></li>
                <li><a href="contact.html">contact</a></li>
                <!-- <li><a href="consulting.html">consulting</a></li> -->
            </ul>
        </nav>

    </div>

    <main>
        <!-- optional content -->
    </main>

</body>
</html>
